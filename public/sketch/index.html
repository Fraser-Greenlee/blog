<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Sketch practice</title>
<style>
  :root {
    --bg: #f5f3ef;
    --fg: #1a1a1a;
    --muted: #888;
    --accent: #d97757;
    --good: #4a8;
    --warn: #c44;
    --panel: #fff;
    --border: #ddd;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    height: 100%;
    background: var(--bg);
    color: var(--fg);
    font: 16px/1.4 -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    -webkit-user-select: none; user-select: none;
    -webkit-touch-callout: none;
    overscroll-behavior: none;
    touch-action: none;
  }
  body { display: flex; flex-direction: column; }
  header {
    display: flex; align-items: center; gap: 0.6rem; flex-wrap: wrap;
    padding: 0.6rem 0.9rem;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
  }
  h1 { font-size: 1.05rem; margin: 0 0.4rem 0 0; font-weight: 600; }
  #timer {
    font-variant-numeric: tabular-nums;
    font-size: 1.2rem; font-weight: 600;
    padding: 0.2rem 0.7rem;
    border-radius: 6px;
    background: #efe9e1;
    min-width: 4ch; text-align: center;
  }
  #timer.warn  { color: var(--warn); }
  #timer.disabled { color: var(--muted); background: transparent; }
  #score {
    font-variant-numeric: tabular-nums;
    font-size: 1.1rem; font-weight: 600;
    color: var(--muted);
    min-width: 5ch;
  }
  button {
    appearance: none; -webkit-appearance: none;
    border: 1px solid var(--border); background: var(--panel);
    padding: 0.5rem 0.9rem; border-radius: 6px;
    font: inherit; font-weight: 500;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  button.primary { background: var(--accent); color: white; border-color: var(--accent); }
  button.toggle.on { background: var(--fg); color: white; border-color: var(--fg); }
  button:disabled { opacity: 0.4; cursor: default; }
  .grow { flex: 1; }
  main {
    flex: 1;
    display: flex;
    gap: 12px;
    padding: 12px;
    min-height: 0;
  }
  .panel {
    flex: 1;
    display: flex; flex-direction: column;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    min-width: 0; min-height: 0;
  }
  .panel-label {
    padding: 0.4rem 0.7rem;
    font-size: 0.85rem; color: var(--muted);
    border-bottom: 1px solid var(--border);
  }
  .stage {
    flex: 1;
    position: relative;
    display: flex; align-items: center; justify-content: center;
    padding: 8px;
    min-height: 0; min-width: 0;
    background:
      linear-gradient(45deg, #fafafa 25%, transparent 25%),
      linear-gradient(-45deg, #fafafa 25%, transparent 25%),
      linear-gradient(45deg, transparent 75%, #fafafa 75%),
      linear-gradient(-45deg, transparent 75%, #fafafa 75%);
    background-size: 14px 14px;
    background-position: 0 0, 0 7px, 7px -7px, -7px 0;
  }
  .stage canvas, .stage img {
    background: white;
    box-shadow: 0 1px 2px rgba(0,0,0,0.05);
    image-rendering: -webkit-optimize-contrast;
  }
  /* The right stage stacks: white background -> faint target (trace) -> draw canvas. */
  #drawWrap { position: relative; transform-origin: 0 0; will-change: transform; }
  #drawWrap > * {
    position: absolute; top: 0; left: 0;
    width: 100%; height: 100%;
  }
  #drawBg { background: white; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
  #traceImg { opacity: 0; transition: opacity 0.15s; pointer-events: none; object-fit: fill; box-shadow: none; background: transparent; }
  #drawWrap.trace #traceImg { opacity: 0.25; }
  #drawCanvas { touch-action: none; cursor: crosshair; background: transparent !important; box-shadow: none; }
  /* Target image is wrapped so we can apply the same transform as the right side. */
  #targetWrap { position: relative; transform-origin: 0 0; will-change: transform; }
  #targetImg { display: block; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }

  @media (max-width: 820px) {
    main { flex-direction: column; }
  }
</style>
</head>
<body>
<header>
  <h1>Sketch</h1>
  <div id="timer">90.0</div>
  <button id="newBtn">New</button>
  <button id="submitBtn" class="primary">Submit</button>
  <button id="timerToggle" class="toggle on">Timer</button>
  <button id="traceToggle" class="toggle">Trace</button>
  <span style="border-left:1px solid var(--border); height:1.6rem; margin:0 .2rem"></span>
  <button id="penBtn"    class="toggle on">Pen</button>
  <button id="pencilBtn" class="toggle">Pencil</button>
  <span style="border-left:1px solid var(--border); height:1.6rem; margin:0 .2rem"></span>
  <button id="undoBtn" disabled>Undo</button>
  <button id="redoBtn" disabled>Redo</button>
  <button id="resetZoomBtn">Reset zoom</button>
  <div class="grow"></div>
  <div id="score">—</div>
</header>
<main>
  <section class="panel">
    <div class="panel-label">Target</div>
    <div class="stage" id="leftStage">
      <div id="targetWrap">
        <img id="targetImg" alt="">
      </div>
    </div>
  </section>
  <section class="panel">
    <div class="panel-label" id="rightLabel">Your drawing</div>
    <div class="stage" id="rightStage">
      <div id="drawWrap">
        <div id="drawBg"></div>
        <img id="traceImg" alt="">
        <canvas id="drawCanvas"></canvas>
      </div>
    </div>
  </section>
</main>

<script>
const ROUND_SECONDS = 90;
const STROKE_FRAC = 0.005;
const TOLERANCE_FRAC = 0.02;
const SCORE_FLOOR = 0.05;

const els = {
  target: document.getElementById('targetImg'),
  trace: document.getElementById('traceImg'),
  canvas: document.getElementById('drawCanvas'),
  drawWrap: document.getElementById('drawWrap'),
  targetWrap: document.getElementById('targetWrap'),
  leftStage: document.getElementById('leftStage'),
  stage: document.getElementById('rightStage'),
  rightLabel: document.getElementById('rightLabel'),
  timer: document.getElementById('timer'),
  score: document.getElementById('score'),
  newBtn: document.getElementById('newBtn'),
  submitBtn: document.getElementById('submitBtn'),
  timerToggle: document.getElementById('timerToggle'),
  traceToggle: document.getElementById('traceToggle'),
  penBtn: document.getElementById('penBtn'),
  pencilBtn: document.getElementById('pencilBtn'),
  undoBtn: document.getElementById('undoBtn'),
  redoBtn: document.getElementById('redoBtn'),
  resetZoomBtn: document.getElementById('resetZoomBtn'),
};

let manifest = [];
let currentSrc = '';
let ctx = els.canvas.getContext('2d');
let drawing = false;
let timerId = null;
let endsAt = 0;
let roundActive = false;
let resultImgEl = null;
let timerEnabled = true;
let traceEnabled = false;
let tool = 'pen';      // 'pen' or 'pencil'
let baseLineWidth = 3; // recomputed on resize

// Undo/redo: each stroke is { style, width, points: [{x,y},...] } in CSS px.
// On every change we redraw all strokes from scratch, which keeps the model
// simple and the iPad-sized canvases fast enough.
let strokes = [];
let redoStack = [];
let activeStroke = null;

// Shared view transform applied to both target and draw wrappers. Stroke
// points stay in untransformed "content" coordinates so they stay anchored to
// the underlying image regardless of zoom/pan.
let view = { scale: 1, tx: 0, ty: 0 };
const MIN_SCALE = 1;
const MAX_SCALE = 8;
let baseSize = { w: 0, h: 0 };

// ---------- Block iOS *page* zoom (not the in-app zoom) ----------
// We still want pinch zoom on our canvas/target, just not the whole page.
// We block iOS's native gesture/double-tap zoom; per-stage code below
// implements its own pinch.
['gesturestart', 'gesturechange', 'gestureend'].forEach(ev => {
  document.addEventListener(ev, e => e.preventDefault(), { passive: false });
});
let lastTouchEnd = 0;
document.addEventListener('touchend', e => {
  const now = Date.now();
  if (now - lastTouchEnd < 350) e.preventDefault();
  lastTouchEnd = now;
}, { passive: false });
document.addEventListener('dblclick', e => e.preventDefault());

// ---------- Manifest + round ----------
async function loadManifest() {
  const r = await fetch('figures.json');
  manifest = await r.json();
}

function pickRandom() {
  return manifest[Math.floor(Math.random() * manifest.length)];
}

function fitCanvasToImage() {
  const img = els.target;
  if (!img.naturalWidth) return;
  // Each stage gets its own fit since the panels can be different sizes
  // (especially when laid out as columns on portrait iPad). Pick the smaller
  // fit so both stages render at exactly the same content size — that's what
  // makes the synced zoom/pan look right.
  const lr = els.leftStage.getBoundingClientRect();
  const rr = els.stage.getBoundingClientRect();
  const fit = (rect) => Math.min(
    (rect.width - 16) / img.naturalWidth,
    (rect.height - 16) / img.naturalHeight,
  );
  const scale = Math.min(fit(lr), fit(rr));
  const cssW = Math.floor(img.naturalWidth * scale);
  const cssH = Math.floor(img.naturalHeight * scale);
  baseSize = { w: cssW, h: cssH };
  const dpr = window.devicePixelRatio || 1;
  els.drawWrap.style.width = cssW + 'px';
  els.drawWrap.style.height = cssH + 'px';
  els.targetWrap.style.width = cssW + 'px';
  els.targetWrap.style.height = cssH + 'px';
  els.canvas.style.width = cssW + 'px';
  els.canvas.style.height = cssH + 'px';
  els.canvas.width = cssW * dpr;
  els.canvas.height = cssH * dpr;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  ctx.clearRect(0, 0, cssW, cssH);
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  baseLineWidth = Math.max(2, Math.round(Math.min(cssW, cssH) * STROKE_FRAC));
  applyTool();
  img.style.width = cssW + 'px';
  img.style.height = cssH + 'px';
  applyView();
}

function applyView() {
  const t = `translate(${view.tx}px, ${view.ty}px) scale(${view.scale})`;
  els.drawWrap.style.transform = t;
  els.targetWrap.style.transform = t;
}

function setView(scale, tx, ty) {
  scale = Math.max(MIN_SCALE, Math.min(MAX_SCALE, scale));
  // Clamp pan so the content stays at least partly visible. With scale 1 and
  // both panels exactly framing the image, keep pan = 0; for higher scales,
  // allow panning anywhere within the scaled box.
  if (baseSize.w && baseSize.h) {
    const w = baseSize.w * scale;
    const h = baseSize.h * scale;
    const minTx = Math.min(0, baseSize.w - w);
    const minTy = Math.min(0, baseSize.h - h);
    const maxTx = 0;
    const maxTy = 0;
    tx = Math.max(minTx, Math.min(maxTx, tx));
    ty = Math.max(minTy, Math.min(maxTy, ty));
  }
  view.scale = scale; view.tx = tx; view.ty = ty;
  applyView();
}

function resetView() {
  view = { scale: 1, tx: 0, ty: 0 };
  applyView();
}

function applyTool() {
  ctx.strokeStyle = currentToolStyle();
  ctx.lineWidth = currentToolWidth();
}
function currentToolStyle() {
  // Pencil is intentionally lighter than the trace overlay (which is ~25%
  // opacity black) so trace strokes remain visible underneath sketching.
  return tool === 'pencil' ? 'rgba(120, 120, 120, 0.12)' : '#222';
}
function currentToolWidth() {
  return tool === 'pencil'
    ? Math.max(2, Math.round(baseLineWidth * 1.4))
    : baseLineWidth;
}

function startRound() {
  clearResult();
  strokes = [];
  redoStack = [];
  activeStroke = null;
  resetView();
  updateUndoButtons();
  setScore(null);
  currentSrc = pickRandom();
  els.target.onload = () => {
    fitCanvasToImage();
  };
  els.target.src = currentSrc;
  els.trace.src = currentSrc;
  roundActive = true;
  if (timerEnabled) {
    endsAt = performance.now() + ROUND_SECONDS * 1000;
    if (timerId) cancelAnimationFrame(timerId);
    tickTimer();
  } else {
    els.timer.classList.add('disabled');
    els.timer.classList.remove('warn');
    els.timer.textContent = '∞';
  }
}

function tickTimer() {
  if (!timerEnabled) return;
  const remaining = (endsAt - performance.now()) / 1000;
  if (remaining <= 0) {
    els.timer.textContent = '0.0';
    els.timer.classList.add('warn');
    finishRound();
    return;
  }
  els.timer.textContent = remaining.toFixed(1);
  els.timer.classList.toggle('warn', remaining < 10);
  els.timer.classList.remove('disabled');
  timerId = requestAnimationFrame(tickTimer);
}

function finishRound() {
  if (!roundActive) return;
  roundActive = false;
  if (timerId) cancelAnimationFrame(timerId);
  if (traceEnabled) {
    setScore('trace');     // skip scoring; tracing makes the score meaningless
    showOverlay();
    return;
  }
  const score = computeScore();
  setScore(score);
  showOverlay();
}

// ---------- Drawing + zoom/pan ----------
// The draw canvas is wrapped by an element with a CSS transform. To convert
// a clientX/clientY into content (untransformed) coordinates we use the
// canvas's bounding rect and divide by the live view scale.
function pointerPosContent(clientX, clientY) {
  const r = els.canvas.getBoundingClientRect();
  return {
    x: (clientX - r.left) / view.scale,
    y: (clientY - r.top)  / view.scale,
  };
}

// Touch state for pinch/pan. We track touches per-stage so a 2-finger pinch
// on either stage zooms both. A single touch on the right stage draws (via
// pointer events below).
function makePinchHandler(stageEl) {
  let active = new Map(); // identifier -> {clientX, clientY}
  let initial = null;     // snapshot at start of 2-finger gesture

  function recompute() {
    if (active.size !== 2) { initial = null; return; }
    const pts = Array.from(active.values());
    const cx = (pts[0].clientX + pts[1].clientX) / 2;
    const cy = (pts[0].clientY + pts[1].clientY) / 2;
    const dx = pts[1].clientX - pts[0].clientX;
    const dy = pts[1].clientY - pts[0].clientY;
    const dist = Math.hypot(dx, dy);
    if (!initial) {
      // Starting a new 2-finger gesture.
      const wrapRect = els.drawWrap.getBoundingClientRect();
      const stageRect = els.stage.getBoundingClientRect();
      // Anchor in content space: the centroid of the two fingers, mapped
      // through the inverse of the current transform that's applied to the
      // right-side wrapper. We use the right-side wrapper because both
      // wrappers receive the same transform; content coords are in the same
      // base space.
      initial = {
        cx, cy, dist,
        startScale: view.scale,
        startTx: view.tx, startTy: view.ty,
        // Centroid in content coords:
        contentX: (cx - wrapRect.left) / view.scale,
        contentY: (cy - wrapRect.top)  / view.scale,
      };
      return;
    }
    const newScale = initial.startScale * (dist / initial.dist);
    // We want the content point (initial.contentX, initial.contentY) to map
    // to the *current* centroid (cx, cy) on screen. The wrapper's screen
    // origin is at stageRect.{left,top} + view.{tx,ty}.
    const stageRect = stageEl.getBoundingClientRect();
    const targetTx = (cx - stageRect.left) - initial.contentX * newScale;
    const targetTy = (cy - stageRect.top)  - initial.contentY * newScale;
    setView(newScale, targetTx, targetTy);
  }

  stageEl.addEventListener('touchstart', e => {
    for (const t of e.changedTouches) {
      active.set(t.identifier, { clientX: t.clientX, clientY: t.clientY });
    }
    if (active.size >= 2) {
      e.preventDefault();
      // If a stroke was in progress, abandon it.
      if (drawing && activeStroke) {
        // Roll back the partial stroke; it would otherwise be a single-point
        // line where the user actually wanted to pinch.
        strokes.pop();
        activeStroke = null;
        drawing = false;
        redrawAllStrokes();
        updateUndoButtons();
      }
      // Reset initial so recompute() captures fresh anchor.
      initial = null;
      recompute();
    }
  }, { passive: false });
  stageEl.addEventListener('touchmove', e => {
    let updated = false;
    for (const t of e.changedTouches) {
      if (active.has(t.identifier)) {
        active.set(t.identifier, { clientX: t.clientX, clientY: t.clientY });
        updated = true;
      }
    }
    if (active.size >= 2) {
      e.preventDefault();
      if (updated) recompute();
    }
  }, { passive: false });
  function endTouch(e) {
    for (const t of e.changedTouches) active.delete(t.identifier);
    if (active.size < 2) initial = null;
  }
  stageEl.addEventListener('touchend', endTouch);
  stageEl.addEventListener('touchcancel', endTouch);
}
makePinchHandler(els.stage);
makePinchHandler(els.leftStage);

// Trackpad / mouse-wheel zoom. Cmd/Ctrl+wheel zooms; plain wheel pans.
function makeWheelHandler(stageEl) {
  stageEl.addEventListener('wheel', e => {
    e.preventDefault();
    if (e.ctrlKey || e.metaKey) {
      const stageRect = stageEl.getBoundingClientRect();
      const wrapRect = els.drawWrap.getBoundingClientRect();
      const cx = e.clientX, cy = e.clientY;
      const contentX = (cx - wrapRect.left) / view.scale;
      const contentY = (cy - wrapRect.top)  / view.scale;
      const factor = Math.exp(-e.deltaY * 0.01);
      const newScale = view.scale * factor;
      const targetTx = (cx - stageRect.left) - contentX * newScale;
      const targetTy = (cy - stageRect.top)  - contentY * newScale;
      setView(newScale, targetTx, targetTy);
    } else {
      setView(view.scale, view.tx - e.deltaX, view.ty - e.deltaY);
    }
  }, { passive: false });
}
makeWheelHandler(els.stage);
makeWheelHandler(els.leftStage);

// Pointer events on the canvas drive drawing. We ignore them when 2+ touches
// are present (pinch-pan) by checking pointerType + a touch counter.
let activeTouchCount = 0;
els.stage.addEventListener('touchstart', e => { activeTouchCount = e.touches.length; }, { passive: true });
els.stage.addEventListener('touchmove', e => { activeTouchCount = e.touches.length; }, { passive: true });
els.stage.addEventListener('touchend', e => { activeTouchCount = e.touches.length; }, { passive: true });
els.stage.addEventListener('touchcancel', e => { activeTouchCount = e.touches.length; }, { passive: true });

els.canvas.addEventListener('pointerdown', e => {
  if (!roundActive) return;
  if (e.pointerType === 'touch' && activeTouchCount > 1) return;
  e.preventDefault();
  els.canvas.setPointerCapture(e.pointerId);
  drawing = true;
  redoStack = [];
  applyTool();
  const p = pointerPosContent(e.clientX, e.clientY);
  activeStroke = {
    style: currentToolStyle(),
    width: currentToolWidth(),
    points: [p],
  };
  strokes.push(activeStroke);
  drawDot(p, activeStroke);
  updateUndoButtons();
});
els.canvas.addEventListener('pointermove', e => {
  if (!drawing || !activeStroke) return;
  if (e.pointerType === 'touch' && activeTouchCount > 1) {
    // A second finger landed — abandon current stroke; pinch handler took over.
    drawing = false;
    return;
  }
  e.preventDefault();
  const p = pointerPosContent(e.clientX, e.clientY);
  const last = activeStroke.points[activeStroke.points.length - 1];
  activeStroke.points.push(p);
  drawSegment(last, p, activeStroke);
});
function endStroke(e) {
  drawing = false;
  activeStroke = null;
  if (els.canvas.hasPointerCapture && e.pointerId !== undefined && els.canvas.hasPointerCapture(e.pointerId)) {
    els.canvas.releasePointerCapture(e.pointerId);
  }
}
els.canvas.addEventListener('pointerup', endStroke);
els.canvas.addEventListener('pointercancel', endStroke);
els.canvas.addEventListener('pointerleave', endStroke);

function drawSegment(a, b, stroke) {
  ctx.strokeStyle = stroke.style;
  ctx.lineWidth = stroke.width;
  ctx.beginPath();
  ctx.moveTo(a.x, a.y);
  ctx.lineTo(b.x, b.y);
  ctx.stroke();
}
function drawDot(p, stroke) {
  drawSegment(p, { x: p.x + 0.01, y: p.y + 0.01 }, stroke);
}
function redrawAllStrokes() {
  const cssW = els.canvas.clientWidth;
  const cssH = els.canvas.clientHeight;
  ctx.clearRect(0, 0, cssW, cssH);
  for (const s of strokes) {
    if (s.points.length === 0) continue;
    ctx.strokeStyle = s.style;
    ctx.lineWidth = s.width;
    ctx.beginPath();
    ctx.moveTo(s.points[0].x, s.points[0].y);
    if (s.points.length === 1) {
      // Single-point tap: draw a tiny segment so it's visible.
      ctx.lineTo(s.points[0].x + 0.01, s.points[0].y + 0.01);
    } else {
      for (let i = 1; i < s.points.length; i++) {
        ctx.lineTo(s.points[i].x, s.points[i].y);
      }
    }
    ctx.stroke();
  }
  // Restore current tool state so the next live stroke uses the right style.
  applyTool();
}

function undo() {
  if (!strokes.length) return;
  redoStack.push(strokes.pop());
  redrawAllStrokes();
  updateUndoButtons();
}
function redo() {
  if (!redoStack.length) return;
  strokes.push(redoStack.pop());
  redrawAllStrokes();
  updateUndoButtons();
}
function updateUndoButtons() {
  els.undoBtn.disabled = strokes.length === 0;
  els.redoBtn.disabled = redoStack.length === 0;
}

// ---------- Scoring ----------
function buildMask(srcCanvas) {
  const w = srcCanvas.width, h = srcCanvas.height;
  const cs = document.createElement('canvas');
  cs.width = w; cs.height = h;
  const cctx = cs.getContext('2d');
  cctx.drawImage(srcCanvas, 0, 0);
  const data = cctx.getImageData(0, 0, w, h).data;
  const mask = new Uint8Array(w * h);
  for (let i = 0, j = 0; i < data.length; i += 4, j++) {
    const lum = (data[i] * 299 + data[i+1] * 587 + data[i+2] * 114) / 1000;
    // Treat any drawn pixel (alpha>32 + luminance darker than background) as ink.
    const alpha = data[i+3];
    mask[j] = (alpha > 32 && lum < 200) ? 1 : 0;
  }
  return { mask, w, h };
}

function buildTargetMask(w, h) {
  const off = document.createElement('canvas');
  off.width = w; off.height = h;
  const c = off.getContext('2d');
  c.fillStyle = 'white';
  c.fillRect(0, 0, w, h);
  c.drawImage(els.target, 0, 0, w, h);
  return buildMask(off);
}

function distanceTransform(mask, w, h) {
  const INF = 1e6;
  const d = new Float32Array(w * h);
  for (let i = 0; i < d.length; i++) d[i] = mask[i] ? 0 : INF;
  for (let y = 0; y < h; y++) {
    for (let x = 0; x < w; x++) {
      const i = y * w + x;
      let v = d[i];
      if (x > 0) v = Math.min(v, d[i - 1] + 1);
      if (y > 0) v = Math.min(v, d[i - w] + 1);
      if (x > 0 && y > 0) v = Math.min(v, d[i - w - 1] + 1.4142);
      if (x < w - 1 && y > 0) v = Math.min(v, d[i - w + 1] + 1.4142);
      d[i] = v;
    }
  }
  for (let y = h - 1; y >= 0; y--) {
    for (let x = w - 1; x >= 0; x--) {
      const i = y * w + x;
      let v = d[i];
      if (x < w - 1) v = Math.min(v, d[i + 1] + 1);
      if (y < h - 1) v = Math.min(v, d[i + w] + 1);
      if (x < w - 1 && y < h - 1) v = Math.min(v, d[i + w + 1] + 1.4142);
      if (x > 0 && y < h - 1) v = Math.min(v, d[i + w - 1] + 1.4142);
      d[i] = v;
    }
  }
  return d;
}

function computeScore() {
  if (!els.target.naturalWidth) return 0;
  const cssW = els.canvas.clientWidth;
  const cssH = els.canvas.clientHeight;
  const tmp = document.createElement('canvas');
  tmp.width = cssW; tmp.height = cssH;
  const tctx = tmp.getContext('2d');
  tctx.drawImage(els.canvas, 0, 0, cssW, cssH);
  const user = buildMask(tmp);
  const target = buildTargetMask(cssW, cssH);
  const userInk = countOnes(user.mask);
  const targetInk = countOnes(target.mask);
  if (userInk === 0 || targetInk === 0) return 0;
  const tol = Math.max(4, Math.round(Math.min(cssW, cssH) * TOLERANCE_FRAC));
  const dtTarget = distanceTransform(target.mask, target.w, target.h);
  const dtUser   = distanceTransform(user.mask,   user.w,   user.h);
  let p = 0;
  for (let i = 0; i < user.mask.length; i++) {
    if (user.mask[i] && dtTarget[i] <= tol) p++;
  }
  let r = 0;
  for (let i = 0; i < target.mask.length; i++) {
    if (target.mask[i] && dtUser[i] <= tol) r++;
  }
  const precision = p / userInk;
  const recall = r / targetInk;
  const f1 = (precision + recall) > 0
    ? (2 * precision * recall) / (precision + recall)
    : 0;
  const stretched = Math.max(0, (f1 - SCORE_FLOOR) / (1 - SCORE_FLOOR));
  return Math.round(stretched * 100);
}

function countOnes(arr) {
  let n = 0;
  for (let i = 0; i < arr.length; i++) n += arr[i];
  return n;
}

function setScore(score) {
  if (score === null) {
    els.score.textContent = '—';
    els.score.style.color = 'var(--muted)';
  } else if (score === 'trace') {
    els.score.textContent = 'trace';
    els.score.style.color = 'var(--muted)';
  } else {
    els.score.textContent = score + ' / 100';
    els.score.style.color =
      score >= 70 ? 'var(--good)' :
      score >= 40 ? 'var(--accent)' :
                    'var(--warn)';
  }
}

function showOverlay() {
  // Reset zoom so the comparison overlay lines up with the unscaled canvas.
  resetView();
  if (resultImgEl) resultImgEl.remove();
  resultImgEl = document.createElement('img');
  resultImgEl.src = currentSrc;
  resultImgEl.style.position = 'absolute';
  resultImgEl.style.opacity = '0.55';
  resultImgEl.style.pointerEvents = 'none';
  resultImgEl.style.mixBlendMode = 'multiply';
  positionOverlay();
  els.stage.appendChild(resultImgEl);
}
function positionOverlay() {
  if (!resultImgEl) return;
  const c = els.canvas.getBoundingClientRect();
  const s = els.stage.getBoundingClientRect();
  resultImgEl.style.left = (c.left - s.left) + 'px';
  resultImgEl.style.top  = (c.top  - s.top)  + 'px';
  resultImgEl.style.width  = c.width  + 'px';
  resultImgEl.style.height = c.height + 'px';
}
function clearResult() {
  if (resultImgEl) { resultImgEl.remove(); resultImgEl = null; }
}

window.addEventListener('resize', () => {
  const old = baseSize;
  fitCanvasToImage();
  if (old.w > 0 && old.h > 0 && (old.w !== baseSize.w || old.h !== baseSize.h)) {
    const sx = baseSize.w / old.w, sy = baseSize.h / old.h;
    for (const s of strokes) for (const p of s.points) { p.x *= sx; p.y *= sy; }
    for (const s of redoStack) for (const p of s.points) { p.x *= sx; p.y *= sy; }
  }
  // Resizing the layout invalidates the current pan position; safer to reset.
  resetView();
  redrawAllStrokes();
  positionOverlay();
});

// ---------- Toggles ----------
function setTimerEnabled(on) {
  timerEnabled = on;
  els.timerToggle.classList.toggle('on', on);
  if (!on) {
    if (timerId) cancelAnimationFrame(timerId);
    els.timer.textContent = '∞';
    els.timer.classList.remove('warn');
    els.timer.classList.add('disabled');
  } else {
    els.timer.classList.remove('disabled');
    if (roundActive) {
      endsAt = performance.now() + ROUND_SECONDS * 1000;
      tickTimer();
    }
  }
}
function setTraceEnabled(on) {
  traceEnabled = on;
  els.traceToggle.classList.toggle('on', on);
  els.drawWrap.classList.toggle('trace', on);
  els.rightLabel.textContent = on ? 'Trace mode (no scoring)' : 'Your drawing';
}

els.newBtn.addEventListener('click', startRound);
els.submitBtn.addEventListener('click', () => {
  if (roundActive) finishRound();
  else startRound();
});
els.timerToggle.addEventListener('click', () => setTimerEnabled(!timerEnabled));
els.traceToggle.addEventListener('click', () => setTraceEnabled(!traceEnabled));

function setTool(name) {
  tool = name;
  els.penBtn.classList.toggle('on', name === 'pen');
  els.pencilBtn.classList.toggle('on', name === 'pencil');
  applyTool();
}
els.penBtn.addEventListener('click', () => setTool('pen'));
els.pencilBtn.addEventListener('click', () => setTool('pencil'));
els.undoBtn.addEventListener('click', undo);
els.redoBtn.addEventListener('click', redo);
els.resetZoomBtn.addEventListener('click', resetView);
document.addEventListener('keydown', e => {
  if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === 'z') {
    e.preventDefault();
    if (e.shiftKey) redo(); else undo();
  }
});

(async () => {
  await loadManifest();
  startRound();
})();
</script>
