<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Sketch practice</title>
<style>
  :root {
    --bg: #f5f3ef;
    --fg: #1a1a1a;
    --muted: #888;
    --accent: #d97757;
    --good: #4a8;
    --warn: #c44;
    --panel: #fff;
    --border: #ddd;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    height: 100%;
    background: var(--bg);
    color: var(--fg);
    font: 16px/1.4 -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    -webkit-user-select: none; user-select: none;
    overscroll-behavior: none;
    touch-action: none;
  }
  body { display: flex; flex-direction: column; }
  header {
    display: flex; align-items: center; gap: 1rem;
    padding: 0.75rem 1rem;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
  }
  h1 { font-size: 1.05rem; margin: 0; font-weight: 600; }
  #timer {
    font-variant-numeric: tabular-nums;
    font-size: 1.2rem; font-weight: 600;
    padding: 0.2rem 0.7rem;
    border-radius: 6px;
    background: #efe9e1;
    min-width: 4ch; text-align: center;
  }
  #timer.warn  { color: var(--warn); }
  #score {
    font-variant-numeric: tabular-nums;
    font-size: 1.1rem; font-weight: 600;
    color: var(--muted);
    min-width: 5ch;
  }
  button {
    appearance: none; -webkit-appearance: none;
    border: 1px solid var(--border); background: var(--panel);
    padding: 0.5rem 0.9rem; border-radius: 6px;
    font: inherit; font-weight: 500;
    cursor: pointer;
  }
  button.primary { background: var(--accent); color: white; border-color: var(--accent); }
  button:disabled { opacity: 0.4; cursor: default; }
  .grow { flex: 1; }
  main {
    flex: 1;
    display: flex;
    gap: 12px;
    padding: 12px;
    min-height: 0;
  }
  .panel {
    flex: 1;
    display: flex; flex-direction: column;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    min-width: 0; min-height: 0;
  }
  .panel-label {
    padding: 0.4rem 0.7rem;
    font-size: 0.85rem; color: var(--muted);
    border-bottom: 1px solid var(--border);
  }
  .stage {
    flex: 1;
    position: relative;
    display: flex; align-items: center; justify-content: center;
    padding: 8px;
    min-height: 0; min-width: 0;
    background:
      linear-gradient(45deg, #fafafa 25%, transparent 25%),
      linear-gradient(-45deg, #fafafa 25%, transparent 25%),
      linear-gradient(45deg, transparent 75%, #fafafa 75%),
      linear-gradient(-45deg, transparent 75%, #fafafa 75%);
    background-size: 14px 14px;
    background-position: 0 0, 0 7px, 7px -7px, -7px 0;
  }
  .stage canvas, .stage img {
    background: white;
    box-shadow: 0 1px 2px rgba(0,0,0,0.05);
    image-rendering: -webkit-optimize-contrast;
  }
  #drawCanvas { touch-action: none; cursor: crosshair; }
  #targetImg { object-fit: contain; max-width: 100%; max-height: 100%; }

  /* Result overlay sits on top of the draw canvas after the round. */
  #resultWrap { position: relative; display: none; }
  #resultWrap.visible { display: block; }
  #resultWrap img, #resultWrap canvas {
    position: absolute; top: 0; left: 0;
  }

  @media (max-width: 820px) {
    main { flex-direction: column; }
  }
</style>
</head>
<body>
<header>
  <h1>Sketch practice</h1>
  <div id="timer">90.0</div>
  <button id="newBtn">New</button>
  <button id="submitBtn" class="primary">Submit</button>
  <div class="grow"></div>
  <div id="score">—</div>
</header>
<main>
  <section class="panel">
    <div class="panel-label">Target</div>
    <div class="stage">
      <img id="targetImg" alt="">
    </div>
  </section>
  <section class="panel">
    <div class="panel-label" id="rightLabel">Your drawing</div>
    <div class="stage" id="rightStage">
      <canvas id="drawCanvas"></canvas>
    </div>
  </section>
</main>

<script>
const ROUND_SECONDS = 90;
const STROKE_FRAC = 0.005;  // pen width as a fraction of min(canvas dim)
const TOLERANCE_FRAC = 0.02; // matching tolerance as a fraction of min(canvas dim)
const SCORE_FLOOR = 0.05;   // F1 below this -> 0; above this stretches to 100

const els = {
  target: document.getElementById('targetImg'),
  canvas: document.getElementById('drawCanvas'),
  stage: document.getElementById('rightStage'),
  rightLabel: document.getElementById('rightLabel'),
  timer: document.getElementById('timer'),
  score: document.getElementById('score'),
  newBtn: document.getElementById('newBtn'),
  submitBtn: document.getElementById('submitBtn'),
};

let manifest = [];
let currentSrc = '';
let ctx = els.canvas.getContext('2d');
let drawing = false;
let lastP = null;
let strokeCount = 0;
let timerId = null;
let endsAt = 0;
let roundActive = false;
let resultImgEl = null;

async function loadManifest() {
  const r = await fetch('figures.json');
  manifest = await r.json();
}

function pickRandom() {
  return manifest[Math.floor(Math.random() * manifest.length)];
}

function fitCanvasToImage() {
  // Make the canvas fill its panel while preserving the target's aspect
  // ratio. Force the target <img> to the same CSS box so the two stages
  // render at identical visual size — important so what you see on the left
  // matches what you draw on the right.
  const img = els.target;
  if (!img.naturalWidth) return;
  const stageRect = els.stage.getBoundingClientRect();
  const maxW = stageRect.width - 16;
  const maxH = stageRect.height - 16;
  const scale = Math.min(maxW / img.naturalWidth, maxH / img.naturalHeight);
  const cssW = Math.floor(img.naturalWidth * scale);
  const cssH = Math.floor(img.naturalHeight * scale);
  const dpr = window.devicePixelRatio || 1;
  els.canvas.style.width = cssW + 'px';
  els.canvas.style.height = cssH + 'px';
  els.canvas.width = cssW * dpr;
  els.canvas.height = cssH * dpr;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  ctx.fillStyle = 'white';
  ctx.fillRect(0, 0, cssW, cssH);
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  ctx.strokeStyle = '#222';
  ctx.lineWidth = Math.max(2, Math.round(Math.min(cssW, cssH) * STROKE_FRAC));
  // Match the target image's rendered size to the canvas size.
  img.style.width = cssW + 'px';
  img.style.height = cssH + 'px';
}

function startRound() {
  clearResult();
  strokeCount = 0;
  els.score.textContent = '—';
  els.score.style.color = 'var(--muted)';
  currentSrc = pickRandom();
  els.target.onload = () => {
    fitCanvasToImage();
  };
  els.target.src = currentSrc + '?t=' + Date.now(); // bypass cache only for variety; safe locally
  roundActive = true;
  endsAt = performance.now() + ROUND_SECONDS * 1000;
  if (timerId) cancelAnimationFrame(timerId);
  tickTimer();
}

function tickTimer() {
  const remaining = (endsAt - performance.now()) / 1000;
  if (remaining <= 0) {
    els.timer.textContent = '0.0';
    els.timer.classList.add('warn');
    finishRound();
    return;
  }
  els.timer.textContent = remaining.toFixed(1);
  els.timer.classList.toggle('warn', remaining < 10);
  timerId = requestAnimationFrame(tickTimer);
}

function finishRound() {
  if (!roundActive) return;
  roundActive = false;
  if (timerId) cancelAnimationFrame(timerId);
  const score = computeScore();
  showScore(score);
  showOverlay();
}

// ---------- Drawing ----------
function pointerPos(e) {
  const r = els.canvas.getBoundingClientRect();
  return { x: e.clientX - r.left, y: e.clientY - r.top };
}
els.canvas.addEventListener('pointerdown', e => {
  if (!roundActive) return;
  els.canvas.setPointerCapture(e.pointerId);
  drawing = true;
  strokeCount++;
  const p = pointerPos(e);
  ctx.beginPath();
  ctx.moveTo(p.x, p.y);
  ctx.lineTo(p.x + 0.01, p.y + 0.01); // make a dot visible on tap
  ctx.stroke();
  lastP = p;
});
els.canvas.addEventListener('pointermove', e => {
  if (!drawing) return;
  const p = pointerPos(e);
  ctx.beginPath();
  ctx.moveTo(lastP.x, lastP.y);
  ctx.lineTo(p.x, p.y);
  ctx.stroke();
  lastP = p;
});
function endStroke(e) {
  drawing = false;
  if (els.canvas.hasPointerCapture && e.pointerId !== undefined && els.canvas.hasPointerCapture(e.pointerId)) {
    els.canvas.releasePointerCapture(e.pointerId);
  }
}
els.canvas.addEventListener('pointerup', endStroke);
els.canvas.addEventListener('pointercancel', endStroke);
els.canvas.addEventListener('pointerleave', endStroke);

// ---------- Scoring ----------
// Build a binary ink mask (Uint8 array, 1 byte per pixel) at the canvas's CSS
// resolution. For the target we render the loaded <img> into an offscreen
// canvas at the same size, threshold luminance. For the user we read the
// drawn canvas and mark anything noticeably darker than white.
function buildMask(srcCanvas) {
  const w = srcCanvas.width, h = srcCanvas.height;
  const cs = document.createElement('canvas');
  cs.width = w; cs.height = h;
  const cctx = cs.getContext('2d');
  cctx.drawImage(srcCanvas, 0, 0);
  const data = cctx.getImageData(0, 0, w, h).data;
  const mask = new Uint8Array(w * h);
  for (let i = 0, j = 0; i < data.length; i += 4, j++) {
    // luminance approximation; we treat ink as "darker than 200".
    const lum = (data[i] * 299 + data[i+1] * 587 + data[i+2] * 114) / 1000;
    mask[j] = lum < 200 ? 1 : 0;
  }
  return { mask, w, h };
}

function buildTargetMask(w, h) {
  const off = document.createElement('canvas');
  off.width = w; off.height = h;
  const c = off.getContext('2d');
  c.fillStyle = 'white';
  c.fillRect(0, 0, w, h);
  c.drawImage(els.target, 0, 0, w, h);
  return buildMask(off);
}

// Distance transform on a binary mask: for each cell, distance (in pixels) to
// the nearest 1-cell. Two-pass (forward + backward) chessboard; close enough
// for our tolerance. Returns Float32Array.
function distanceTransform(mask, w, h) {
  const INF = 1e6;
  const d = new Float32Array(w * h);
  for (let i = 0; i < d.length; i++) d[i] = mask[i] ? 0 : INF;
  // Forward pass.
  for (let y = 0; y < h; y++) {
    for (let x = 0; x < w; x++) {
      const i = y * w + x;
      let v = d[i];
      if (x > 0) v = Math.min(v, d[i - 1] + 1);
      if (y > 0) v = Math.min(v, d[i - w] + 1);
      if (x > 0 && y > 0) v = Math.min(v, d[i - w - 1] + 1.4142);
      if (x < w - 1 && y > 0) v = Math.min(v, d[i - w + 1] + 1.4142);
      d[i] = v;
    }
  }
  // Backward pass.
  for (let y = h - 1; y >= 0; y--) {
    for (let x = w - 1; x >= 0; x--) {
      const i = y * w + x;
      let v = d[i];
      if (x < w - 1) v = Math.min(v, d[i + 1] + 1);
      if (y < h - 1) v = Math.min(v, d[i + w] + 1);
      if (x < w - 1 && y < h - 1) v = Math.min(v, d[i + w + 1] + 1.4142);
      if (x > 0 && y < h - 1) v = Math.min(v, d[i + w - 1] + 1.4142);
      d[i] = v;
    }
  }
  return d;
}

function computeScore() {
  if (!els.target.naturalWidth) return 0;
  const cssW = els.canvas.clientWidth;
  const cssH = els.canvas.clientHeight;
  // Build masks at canvas CSS resolution. Downsample heavy DPR canvas via temp.
  const tmp = document.createElement('canvas');
  tmp.width = cssW; tmp.height = cssH;
  const tctx = tmp.getContext('2d');
  tctx.drawImage(els.canvas, 0, 0, cssW, cssH);
  const user = buildMask(tmp);
  const target = buildTargetMask(cssW, cssH);
  const userInk = countOnes(user.mask);
  const targetInk = countOnes(target.mask);
  if (userInk === 0 || targetInk === 0) return 0;

  const tol = Math.max(4, Math.round(Math.min(cssW, cssH) * TOLERANCE_FRAC));
  const dtTarget = distanceTransform(target.mask, target.w, target.h);
  const dtUser   = distanceTransform(user.mask,   user.w,   user.h);

  // Precision: of user ink, what fraction lies within `tol` of target ink.
  let p = 0;
  for (let i = 0; i < user.mask.length; i++) {
    if (user.mask[i] && dtTarget[i] <= tol) p++;
  }
  // Recall: of target ink, what fraction is covered by user ink within `tol`.
  let r = 0;
  for (let i = 0; i < target.mask.length; i++) {
    if (target.mask[i] && dtUser[i] <= tol) r++;
  }
  const precision = p / userInk;
  const recall = r / targetInk;
  const f1 = (precision + recall) > 0
    ? (2 * precision * recall) / (precision + recall)
    : 0;
  // Stretch [SCORE_FLOOR, 1] to [0, 100] so a halfhearted scribble scores low
  // and a faithful sketch can hit 80+.
  const stretched = Math.max(0, (f1 - SCORE_FLOOR) / (1 - SCORE_FLOOR));
  return Math.round(stretched * 100);
}

function countOnes(arr) {
  let n = 0;
  for (let i = 0; i < arr.length; i++) n += arr[i];
  return n;
}

function showScore(score) {
  els.score.textContent = score + ' / 100';
  els.score.style.color =
    score >= 70 ? 'var(--good)' :
    score >= 40 ? 'var(--accent)' :
                  'var(--warn)';
}

// Overlay: position the target image directly on top of the user's drawing
// at 50% opacity so they can see how close they got.
function showOverlay() {
  if (resultImgEl) resultImgEl.remove();
  resultImgEl = document.createElement('img');
  resultImgEl.src = currentSrc;
  resultImgEl.style.position = 'absolute';
  resultImgEl.style.opacity = '0.55';
  resultImgEl.style.pointerEvents = 'none';
  resultImgEl.style.mixBlendMode = 'multiply';
  positionOverlay();
  els.stage.appendChild(resultImgEl);
}
function positionOverlay() {
  if (!resultImgEl) return;
  const c = els.canvas.getBoundingClientRect();
  const s = els.stage.getBoundingClientRect();
  resultImgEl.style.left = (c.left - s.left) + 'px';
  resultImgEl.style.top  = (c.top  - s.top)  + 'px';
  resultImgEl.style.width  = c.width  + 'px';
  resultImgEl.style.height = c.height + 'px';
}
function clearResult() {
  if (resultImgEl) { resultImgEl.remove(); resultImgEl = null; }
}

window.addEventListener('resize', () => {
  if (!roundActive && resultImgEl) { /* leave overlay until next round */ }
  fitCanvasToImage();
  positionOverlay();
});

els.newBtn.addEventListener('click', startRound);
els.submitBtn.addEventListener('click', () => {
  if (roundActive) finishRound();
  else startRound();
});

(async () => {
  await loadManifest();
  startRound();
})();
</script>
</body>
</html>
