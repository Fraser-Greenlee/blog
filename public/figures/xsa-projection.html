<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, 'Helvetica Neue', Helvetica, Arial, sans-serif;
    background: transparent;
    color: #333;
    line-height: 1.5;
  }
  .figure-container {
    max-width: 920px;
    margin: 0 auto;
    padding: 24px 16px;
  }
  h2 {
    font-size: 18px;
    font-weight: 600;
    text-align: center;
    margin-bottom: 4px;
    color: #222;
  }
  .subtitle {
    font-size: 13px;
    text-align: center;
    color: #888;
    margin-bottom: 24px;
  }
  .panels {
    display: flex;
    gap: 36px;
    justify-content: center;
  }
  .panel {
    flex: 1;
    max-width: 430px;
  }
  .panel-header {
    font-size: 15px;
    font-weight: 600;
    margin-bottom: 14px;
    padding-bottom: 6px;
    border-bottom: 2px solid;
  }
  .panel-header.b32 { color: #4477AA; border-color: #4477AA; }
  .panel-header.b14 { color: #228833; border-color: #228833; }

  .target-section {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 18px;
  }
  .target-img {
    border: 3px solid #555;
    border-radius: 4px;
    flex-shrink: 0;
  }
  .target-label {
    font-size: 13px;
    color: #555;
  }
  .target-label strong {
    display: block;
    font-size: 14px;
    color: #333;
    margin-bottom: 2px;
  }
  .target-label .metric {
    font-variant-numeric: tabular-nums;
  }

  .section-label {
    font-size: 11px;
    font-weight: 600;
    color: #999;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin: 18px 0 8px 0;
  }

  .patch-row {
    display: flex;
    gap: 6px;
    align-items: flex-start;
    flex-wrap: wrap;
  }
  .patch-cell {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
  }
  .patch-cell img {
    border-radius: 3px;
    border: 2px solid #e0e0e0;
    transition: border-color 0.15s;
  }
  .patch-cell img:hover {
    border-color: #888;
  }
  .patch-meta {
    font-size: 9px;
    color: #aaa;
    font-variant-numeric: tabular-nums;
    text-align: center;
    line-height: 1.3;
  }

  .divider {
    display: flex;
    align-items: center;
    gap: 8px;
    margin: 20px 0 4px 0;
  }
  .divider-line {
    flex: 1;
    height: 1px;
    background: #e0e0e0;
  }
  .divider-text {
    font-size: 11px;
    color: #aaa;
    white-space: nowrap;
    font-style: italic;
  }

  .verdict {
    font-size: 13px;
    font-weight: 600;
    margin-top: 16px;
    padding: 10px 14px;
    border-radius: 6px;
    text-align: center;
    line-height: 1.4;
  }
  .verdict.helps {
    background: #f0faf2;
    color: #1a7a2e;
    border: 1px solid #c8e6c9;
  }
  .verdict.hurts {
    background: #fef3f0;
    color: #b33;
    border: 1px solid #ffcdd2;
  }

  .footnote {
    font-size: 10px;
    color: #ccc;
    text-align: center;
    margin-top: 24px;
  }

  @media (max-width: 720px) {
    .panels { flex-direction: column; align-items: center; }
  }
</style>
</head>

function buildPatchRow(patches, patchSize, showAttn) {
  const row = document.createElement('div');
  row.className = 'patch-row';

  patches.forEach(p => {
    const cell = document.createElement('div');
    cell.className = 'patch-cell';

    const img = document.createElement('img');
    img.src = p.patch_b64;
    img.width = patchSize;
    img.height = patchSize;
    cell.appendChild(img);

    const meta = document.createElement('div');
    meta.className = 'patch-meta';
    let label = 'sim ' + p.cos_sim_pixel.toFixed(2);
    if (showAttn) {
      label = 'a=' + p.attn_weight.toFixed(3) + '\n' + label;
    }
    meta.textContent = label;
    meta.style.whiteSpace = 'pre';
    cell.appendChild(meta);

    row.appendChild(cell);
  });

  return row;
}

function buildPanel(container, modelData, cssClass) {
  const panel = document.createElement('div');
  panel.className = 'panel';

  const numTokens = modelData.num_tokens - 1;
  const patchLabel = modelData.patch_size + '\u00d7' + modelData.patch_size;

  // Header
  const header = document.createElement('div');
  header.className = 'panel-header ' + cssClass;
  header.textContent = cssClass === 'b32'
    ? 'ViT-B/32  \u00b7  ' + patchLabel + ' patches  \u00b7  ' + numTokens + ' tokens'
    : 'ViT-B/14  \u00b7  ' + patchLabel + ' patches  \u00b7  ' + numTokens + ' tokens';
  panel.appendChild(header);

  // Target patch
  const targetSec = document.createElement('div');
  targetSec.className = 'target-section';
  const targetImg = document.createElement('img');
  targetImg.src = modelData.target_b64;
  targetImg.width = 72;
  targetImg.height = 72;
  targetImg.className = 'target-img';
  targetSec.appendChild(targetImg);
  const targetLabel = document.createElement('div');
  targetLabel.className = 'target-label';
  targetLabel.innerHTML = '<strong>Target patch (V<sub>self</sub>)</strong>' +
    '<span class="metric">cos(Y, V<sub>self</sub>) = ' + modelData.cos_y_v + '</span>';
  targetSec.appendChild(targetLabel);
  panel.appendChild(targetSec);

  // Top attended patches
  const nLabel = document.createElement('div');
  nLabel.className = 'section-label';
  nLabel.textContent = 'What attention mixes in (top attended)';
  panel.appendChild(nLabel);

  const patchSize = Math.min(58, Math.floor(400 / modelData.neighbors.length) - 6);
  panel.appendChild(buildPatchRow(modelData.neighbors, patchSize, true));

  // Divider
  const divider = document.createElement('div');
  divider.className = 'divider';
  divider.innerHTML = '<div class="divider-line"></div>' +
    '<div class="divider-text">XSA weakens the self-similar axis</div>' +
    '<div class="divider-line"></div>';
  panel.appendChild(divider);

  // Orthogonal patches
  const oLabel = document.createElement('div');
  oLabel.className = 'section-label';
  oLabel.textContent = 'Patches orthogonal to target (sim \u2248 0)';
  panel.appendChild(oLabel);

  panel.appendChild(buildPatchRow(modelData.orthogonal, patchSize, false));

  // Verdict
  const verdict = document.createElement('div');
  if (modelData.cos_y_v > 0.4) {
    verdict.className = 'verdict helps';
    verdict.innerHTML = 'XSA strips the self-copy, keeps genuinely new context.';
  } else {
    verdict.className = 'verdict hurts';
    verdict.innerHTML = 'XSA still weakens the self-similar axis, removing real signal.';
  }
  panel.appendChild(verdict);

  container.appendChild(panel);
}

// Build figure
const fig = document.getElementById('fig');

const title = document.createElement('h2');
title.textContent = 'What attention mixes in, and what survives XSA';
fig.appendChild(title);

const subtitle = document.createElement('div');
subtitle.className = 'subtitle';
subtitle.textContent = 'XSA projects out the self-value direction from the attention output. ' +
  'When neighbors are redundant copies of the target, this strips noise. ' +
  'When neighbors are distinct, it strips signal.';
fig.appendChild(subtitle);

const panels = document.createElement('div');
panels.className = 'panels';
buildPanel(panels, DATA.B14, 'b14');
buildPanel(panels, DATA.B32, 'b32');
fig.appendChild(panels);

const footnote = document.createElement('div');
footnote.className = 'footnote';
footnote.textContent = 'Real attention weights from trained ViT-B checkpoints \u00b7 ' +
  'Layer 6, Head 0 \u00b7 ImageNet validation image';
fig.appendChild(footnote);
</script>
