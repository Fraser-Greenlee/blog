const MODELS = [
  {key: "ViT-B-32", label: "ViT-B/32 (32x32 patches)", color: "#4477AA"},
  {key: "ViT-B-14", label: "ViT-B/14 (14x14 patches)", color: "#228833"}
];

function valToColor(val) {
  // blue-white-red diverging, clamped to [-1,1]
  let t = (val + 1) / 2;
  t = Math.max(0, Math.min(1, t));
  let r, g, b;
  if (t < 0.5) {
    let s = t / 0.5;
    r = Math.round(59 + s * (255 - 59));
    g = Math.round(76 + s * (255 - 76));
    b = Math.round(192 + s * (255 - 192));
  } else {
    let s = (t - 0.5) / 0.5;
    r = Math.round(255 - s * (255 - 215));
    g = Math.round(255 - s * (255 - 48));
    b = Math.round(255 - s * (255 - 39));
  }
  return `rgb(${r},${g},${b})`;
}

const container = document.getElementById('panels');

MODELS.forEach(m => {
  const d = SIM_DATA[m.key];
  const gs = d.grid_size;
  const px = 224 / gs;
  const tr = d.target_row;
  const tc = d.target_col;

  const panel = document.createElement('div');
  panel.className = 'sim-panel';

  const label = document.createElement('div');
  label.className = 'sim-panel-label';
  label.style.color = m.color;
  label.textContent = m.label;
  panel.appendChild(label);

  const wrap = document.createElement('div');
  wrap.className = 'sim-canvas-wrap';

  const img = document.createElement('img');
  img.src = IMG_B64;
  wrap.appendChild(img);

  // SVG overlay
  const svgNS = 'http://www.w3.org/2000/svg';
  const svg = document.createElementNS(svgNS, 'svg');
  svg.setAttribute('class', 'sim-overlay');
  svg.setAttribute('viewBox', '0 0 224 224');

  for (let r = 0; r < gs; r++) {
    for (let c = 0; c < gs; c++) {
      const val = d.sim_grid[r][c];
      const rect = document.createElementNS(svgNS, 'rect');
      rect.setAttribute('x', (c * px).toFixed(1));
      rect.setAttribute('y', (r * px).toFixed(1));
      rect.setAttribute('width', Math.ceil(px));
      rect.setAttribute('height', Math.ceil(px));
      const isTarget = (r === tr && c === tc);
      rect.setAttribute('fill', valToColor(val));
      rect.setAttribute('opacity', isTarget ? '0.0' : '0.65');
      svg.appendChild(rect);

      if (isTarget) {
        const border = document.createElementNS(svgNS, 'rect');
        border.setAttribute('x', (c * px + 1).toFixed(1));
        border.setAttribute('y', (r * px + 1).toFixed(1));
        border.setAttribute('width', Math.ceil(px) - 2);
        border.setAttribute('height', Math.ceil(px) - 2);
        border.setAttribute('fill', 'none');
        border.setAttribute('stroke', '#fff');
        border.setAttribute('stroke-width', '2.5');
        border.setAttribute('rx', '1');
        svg.appendChild(border);
      }
    }
  }

  wrap.appendChild(svg);
  panel.appendChild(wrap);

  const ann = document.createElement('div');
  ann.className = 'sim-annotation';
  ann.innerHTML = 'mean sim = ' + d.mean_sim.toFixed(3) + ' &middot; ' + d.tokens + ' tokens';
  panel.appendChild(ann);

  container.appendChild(panel);
});
